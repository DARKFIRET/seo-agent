version: "3.9"

services:
  # Наше Node.js приложение
  app:
    build: .
    container_name: seo_agent_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # Пробрасываем порт 3000 только для локальной машины (Caddy)
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://lumina:lumina_secret@db:5432/lumina
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads

  # База данных PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: seo_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lumina
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina_secret
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
